[settings]
default_editor_file=nano
default_editor_folder=code
auto_select_first_found_item=false
config_path=~/.config
use_fzf=true
smart_search=true
max_results=20

[aliases]
hyprland=hypr
neovim=nvim

[targets]
ssh=~/.ssh/config
cf=~/.config/cf/config.ini
fish=~/.config/fish/config.fish
hyprland=~/.config/hypr/*
kitty=~/.config/kitty/kitty.conf
neovim=~/.config/nvim/*
zsh=~/.zshrc
bash=~/.bashrc
tmux=~/.tmux.conf
starship=~/.config/starship.toml
